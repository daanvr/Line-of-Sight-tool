<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Line of Sight — Wikimedia Commons photo viewer</title>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
  <!-- Geocoder (search box) -->
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css" />
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

  <style>
    :root {
      --cam: #ffffff;            /* camera location          */
      --los: hsl(190, 95%, 62%); /* line of sight            */
      --obj: #ffb454;            /* subject / object location*/
      --panel: rgba(18, 28, 30, 0.82);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #eaf2f2;
      --muted: #9fb2b2;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1a2526;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    #map {
      position: absolute;
      inset: 0;
      transition: filter 0.25s ease;
    }
    #map.blur { filter: blur(14px) brightness(0.7); }

    /* ---------- Title / intro panel ---------- */
    #intro {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 5;
      max-width: 330px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #intro h1 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #intro h1 .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--los);
      box-shadow: 0 0 10px var(--los);
    }
    #intro p { margin: 0; font-size: 12.5px; line-height: 1.5; color: var(--muted); }
    #intro .hint { margin-top: 8px; font-size: 11.5px; color: var(--los); }

    /* ---------- Control panel (layers · filters · basemap) ---------- */
    #panel {
      position: absolute;
      left: 12px;
      bottom: 28px;
      z-index: 6;
      width: 256px;
      max-width: 82vw;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 12px;
      overflow: hidden;
    }
    #panel .phead {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding: 9px 12px; cursor: pointer; user-select: none;
      font-weight: 600; color: var(--text);
    }
    #panel .phead .chev { color: var(--muted); transition: transform .2s ease; }
    #panel.collapsed .pbody { display: none; }
    #panel.collapsed .phead .chev { transform: rotate(-90deg); }
    #panel .pbody { max-height: 64vh; overflow-y: auto; padding: 0 12px 10px; }
    #panel .sect { border-top: 1px solid var(--panel-border); padding: 9px 0 5px; }
    #panel .sect:first-child { border-top: 0; }
    #panel .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 6px; }
    #panel .row { display: flex; align-items: center; gap: 8px; padding: 3px 0; color: var(--muted); }
    #panel .row .name { flex: 1; color: var(--text); cursor: pointer; }
    #panel .row .k { color: var(--muted); font-size: 11px; }
    #panel .frow { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    #panel .frow .k { flex: 0 0 58px; color: var(--muted); font-size: 11px; }
    #panel .frow .v { flex: 0 0 46px; text-align: right; font-size: 10.5px; color: var(--text); }
    #panel input[type=range] { flex: 1; min-width: 0; accent-color: var(--los); height: 16px; }
    #panel input[type=range].mini { flex: 0 0 64px; }
    #panel input[type=color] { width: 24px; height: 18px; flex: 0 0 24px; padding: 0; border: 1px solid var(--panel-border); border-radius: 4px; background: none; cursor: pointer; }
    #panel input[type=checkbox] { accent-color: var(--los); width: 14px; height: 14px; flex: 0 0 14px; }
    #panel .sub2 { padding-left: 22px; }
    #panel .sub2 .k2 { flex: 0 0 50px; font-size: 10.5px; color: var(--muted); }
    #panel .swatch { width: 16px; height: 14px; flex: 0 0 16px; display: inline-flex; align-items: center; justify-content: center; }
    #panel .swatch.cam::before  { content: ""; width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,.15); border: 1.5px solid var(--cam); }
    #panel .swatch.los::before  { content: ""; width: 16px; height: 3px; border-radius: 2px; background: var(--los); }
    #panel .swatch.obj::before  { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--obj); }
    #panel .swatch.cone { clip-path: polygon(50% 100%, 8% 12%, 92% 12%); background: linear-gradient(to top, #ffffff, #4a96ff); }
    #panel .seg { display: flex; gap: 4px; flex: 1; }
    #panel .seg button { flex: 1; background: rgba(0,0,0,.25); color: var(--muted); border: 1px solid var(--panel-border); border-radius: 6px; padding: 4px 0; font-size: 11px; cursor: pointer; }
    #panel .seg button.on { background: var(--los); color: #08222a; border-color: var(--los); font-weight: 600; }
    #panel select { width: 100%; background: rgba(0,0,0,.25); color: var(--text); border: 1px solid var(--panel-border); border-radius: 6px; padding: 5px 6px; font-size: 12px; }
    #panel .readout { font-size: 10px; color: var(--muted); padding-left: 58px; min-height: 12px; }
    #panel .btn { width: 100%; background: rgba(0,0,0,.25); color: var(--text); border: 1px solid var(--panel-border); border-radius: 6px; padding: 7px 0; font-size: 12px; cursor: pointer; }
    #panel .btn:hover { border-color: var(--los); }
    #panel .btn.active { background: var(--los); color: #08222a; border-color: var(--los); font-weight: 600; }

    /* ---------- Right-click services menu ---------- */
    #ctxmenu {
      position: absolute;
      z-index: 60;
      display: none;
      min-width: 168px;
      padding: 5px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #ctxmenu .cm-head { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); padding: 4px 8px 6px; }
    #ctxmenu a { display: block; padding: 6px 8px; font-size: 12.5px; color: var(--text); text-decoration: none; border-radius: 6px; }
    #ctxmenu a:hover { background: rgba(255,255,255,.08); color: var(--los); }
    #ctxmenu .cm-coord { font-size: 10.5px; color: var(--muted); padding: 6px 8px 3px; border-top: 1px solid var(--panel-border); margin-top: 4px; }

    /* ---------- Status pill (loading / count) ---------- */
    #status {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      padding: 7px 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-size: 12.5px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    #status .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: var(--los);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    #status.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Hover preview thumbnail ---------- */
    #preview {
      position: absolute;
      right: 12px;
      bottom: 28px;
      z-index: 6;
      width: 300px;
      max-width: 42vw;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.15s ease, transform 0.15s ease;
      pointer-events: none;
    }
    #preview.show { opacity: 1; transform: translateY(0); }
    #preview img { display: block; width: 100%; height: auto; background: #000; opacity: 0; transition: opacity 0.12s ease; }
    #preview img.loaded { opacity: 1; }
    #preview .cap { padding: 8px 10px; font-size: 11.5px; line-height: 1.4; color: var(--muted); }
    #preview .cap strong { color: var(--text); font-weight: 600; }

    /* ---------- Full-size modal ---------- */
    #modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
    }
    #modal.show { display: flex; }
    #modal .frame {
      position: relative;
      max-width: 92vw;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #modal img {
      max-width: 92vw;
      max-height: 80vh;
      border-radius: 10px;
      box-shadow: var(--shadow);
      background: #000;
    }
    #modal .meta {
      margin-top: 12px;
      text-align: center;
      max-width: 80vw;
    }
    #modal .meta .title { font-size: 14px; font-weight: 600; }
    #modal .meta .by { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
    #modal .meta .by a { color: var(--muted); }
    #modal .meta .links { margin-top: 10px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    #modal .meta .links a {
      font-size: 12.5px;
      color: var(--los);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
    }
    #modal .meta .links a:hover { border-color: var(--los); }
    #modal .close {
      position: absolute;
      top: -14px; right: -14px;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .mapboxgl-ctrl-geocoder { min-width: 240px; }

    @media (max-width: 620px) {
      #intro { max-width: 60vw; }
      #preview { width: 180px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="intro">
    <h1><span class="dot"></span> Line of Sight</h1>
    <p>
      Photos from <strong>Wikimedia Commons</strong> on the terrain. A cone shows the
      direction each photo faces — its width reflects how far the subject is.
    </p>
    <p class="hint">Hover to preview · click to open · right-click for map services</p>
  </div>

  <div id="status"><span class="spinner"></span><span id="status-text">Move the map to load photos…</span></div>

  <div id="panel" class="collapsed">
    <div class="phead"><span>Layers · filters · basemap</span><span class="chev">▾</span></div>
    <div class="pbody"><!-- built by JS from CONFIG --></div>
  </div>

  <div id="ctxmenu"></div>

  <div id="preview">
    <img id="preview-img" alt="" />
    <div class="cap" id="preview-cap"></div>
  </div>

  <div id="modal">
    <div class="frame">
      <button class="close" id="modal-close" aria-label="Close">×</button>
      <img id="modal-img" alt="" />
      <div class="meta" id="modal-meta"></div>
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    // Public demo token (from the original prototype). Replace if it expires.
    mapboxgl.accessToken =
      "pk.eyJ1IjoiZ291ZGFwcGVsIiwiYSI6ImNqeXprc3phbjAybTEzZGxqZzR1OHZqOWEifQ.jRzPHdAKKUmyL72_8-2glw";

    const COMMONS_API = "https://commons.wikimedia.org/w/api.php";
    const FILEPATH    = "https://commons.wikimedia.org/wiki/Special:FilePath/";
    const LOCATOR     = "https://locator-tool.toolforge.org/#/geolocate?files=";

    const R = 6371000;       // earth radius (m)
    const DIM = 0.1;         // opacity of non-hovered features
    const MAX_PHOTOS = 1000; // cap; oldest photos are evicted past this
    const LEN_MAX = 3000;    // upper bound (m) of the line-of-sight length filter

    // ---- Configurable appearance (single source of truth for every layer) ----
    const CONFIG = {
      cones:   { visible: true,  color: "#9ec9ff", opacity: 0.18, pxSize: 26, ramp: true },
      lines:   { visible: false, color: "#34d6f2", opacity: 0.85, width: 2 }, // OFF by default; the cone carries direction + distance
      objects: { visible: true,  color: "#ffb454", opacity: 0.9,  size: 5 },
      cameras: { visible: true,  color: "#ffffff", opacity: 0.5,  size: 7 }
    };

    // ---- Filter state --------------------------------------------------------
    const FILTERS = { minLen: 0, maxLen: LEN_MAX, los: "all", bearMin: 0, bearMax: 360 };

    // ---- Basemaps + external map services ------------------------------------
    const BASEMAPS = [
      { id: "satellite-streets-v12", name: "Satellite" },
      { id: "outdoors-v12",          name: "Outdoors (terrain)" },
      { id: "streets-v12",           name: "Streets" },
      { id: "dark-v11",              name: "Dark" }
    ];
    let currentStyle = "satellite-streets-v12";
    let terrainOn = true;

    // Right-click destinations. Each builds a URL from (lat, lon, zoom, bearing).
    const MAP_SERVICES = [
      { name: "Google Maps",        url: (la, lo, z)    => "https://www.google.com/maps/@" + la + "," + lo + "," + Math.round(z) + "z" },
      { name: "Google Street View", url: (la, lo, z, b) => "https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=" + la + "," + lo + "&heading=" + Math.round(((b % 360) + 360) % 360) },
      { name: "Google Earth",       url: (la, lo, z, b) => "https://earth.google.com/web/@" + la + "," + lo + ",0a,1500d,35y," + Math.round(((b % 360) + 360) % 360) + "h,60t,0r" },
      { name: "Apple Maps",         url: (la, lo, z)    => "https://maps.apple.com/?ll=" + la + "," + lo + "&z=" + Math.round(z) + "&t=h" },
      { name: "Yandex Maps",        url: (la, lo, z)    => "https://yandex.com/maps/?ll=" + lo + "%2C" + la + "&z=" + Math.round(z) },
      { name: "OpenStreetMap",      url: (la, lo, z)    => "https://www.openstreetmap.org/#map=" + Math.round(z) + "/" + la + "/" + lo },
      { name: "WikiShootMe",        url: (la, lo, z)    => "https://wikishootme.toolforge.org/#lat=" + la + "&lng=" + lo + "&zoom=" + Math.round(z) },
      { name: "Mapillary",          url: (la, lo, z)    => "https://www.mapillary.com/app/?lat=" + la + "&lng=" + lo + "&z=" + Math.round(z) },
      { name: "Strava heatmap",     url: (la, lo, z)    => "https://www.strava.com/maps/global-heatmap#" + Math.round(z) + "/" + lo + "/" + la },
      { name: "Bing Maps",          url: (la, lo, z)    => "https://www.bing.com/maps?cp=" + la + "~" + lo + "&lvl=" + Math.round(z) + "&style=h" }
    ];

    // ---- Polygon-select state ------------------------------------------------
    let selectMode = false;        // is the user drawing a selection polygon
    let selectPts = [];            // [lng,lat] vertices of the in-progress polygon
    let clickTimer = null;         // single- vs double-click discrimination
    let $selectBtn = null;         // the "Select area" button (built into the panel)

    // ---- Persisted UI state (localStorage) -----------------------------------
    const LS_KEY = "los-state-v1";
    let lastSearch = "";                 // geocoder query / chosen place text
    let savedMapView = null;             // {center,zoom,bearing,pitch} fallback when the URL has no #map hash
    let pendingPanelCollapsed = true;    // panel is collapsed by default (until the user opens it / saved state says otherwise)
    let pendingModal = null;             // {url,title} photo to re-open on load
    let modalState = { open: false, url: null, title: null };
    // Hydrate CONFIG / FILTERS / basemap / terrain / search / modal BEFORE the map,
    // panel, and layers are built so everything comes up exactly as it was left.
    loadSavedState();

    // ---- Data stores ---------------------------------------------------------
    const seen = new Set();                          // de-dupe by file url
    const order = [];                                // url insertion order (FIFO eviction)
    const urlToId = new Map();                       // url -> stable numeric feature id
    let nextId = 1;                                  // ids start at 1 (0 is falsy in feature-state)

    const cones   = { type: "FeatureCollection", features: [] };
    const lines   = { type: "FeatureCollection", features: [] };
    const objects = { type: "FeatureCollection", features: [] };
    const cameras = { type: "FeatureCollection", features: [] };
    // Index-aligned: SOURCES[i] is the data for the layer/source named SOURCE_IDS[i].
    const SOURCES    = [cones, lines, objects, cameras];
    const SOURCE_IDS = ["cones", "lines", "objects", "cameras"];

    // Attribution (author/license) — fetched lazily on hover/click, cached by title.
    const attrCache = new Map();                     // title -> {author, authorHtml, license}
    const attrInflight = new Map();                  // title -> Promise

    // Hover / request state
    let loadAbort = null;                            // AbortController for in-flight geosearch
    let hoverId = null;                              // currently highlighted feature id
    let dimActive = false;                           // is a hover dim-session active
    let pendingPoint = null, rafId = 0;              // rAF-throttled hover query
    let previewToken = 0, modalToken = 0;            // guard async attribution fills

    function idFor(url) {
      let id = urlToId.get(url);
      if (id === undefined) { id = nextId++; urlToId.set(url, id); }
      return id;
    }

    // ---- DOM refs ------------------------------------------------------------
    const $map        = document.getElementById("map");
    const $status     = document.getElementById("status");
    const $statusText = document.getElementById("status-text");
    const $preview    = document.getElementById("preview");
    const $previewImg = document.getElementById("preview-img");
    const $previewCap = document.getElementById("preview-cap");
    const $modal      = document.getElementById("modal");
    const $modalImg   = document.getElementById("modal-img");
    const $modalMeta  = document.getElementById("modal-meta");
    const $ctx        = document.getElementById("ctxmenu");

    // ---- Map -----------------------------------------------------------------
    // Restore view from the URL hash, else the last saved view, else Djémila.
    const startView = readHash() || savedMapView;
    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/" + currentStyle,
      center: startView ? startView.center : [5.735978, 36.32068], // Djémila, Algeria (Roman ruins — lots of geotagged photos)
      zoom:    startView ? startView.zoom    : 16,
      pitch:   startView ? startView.pitch   : 60,
      bearing: startView ? startView.bearing : -20,
      antialias: false
    });

    const geocoder = new MapboxGeocoder({ accessToken: mapboxgl.accessToken, mapboxgl: mapboxgl, marker: false });
    map.addControl(geocoder, "top-right");
    geocoder.on("result", function (e) { lastSearch = (e.result && (e.result.place_name || e.result.text)) || lastSearch; saveStateDebounced(); });
    geocoder.on("clear", function () { lastSearch = ""; saveStateDebounced(); });
    map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), "top-right");

    buildPanel();        // build the interactive layers/filters/basemap panel from CONFIG
    applyRestoredUI();   // restore panel-collapse, search text, and any open photo modal

    // Runs on the initial load AND again after every setStyle (basemap switch),
    // which wipes custom sources/layers — so everything is re-added idempotently.
    map.on("style.load", function () {
      map.addSource("mapbox-dem", {
        type: "raster-dem",
        url: "mapbox://mapbox.mapbox-terrain-dem-v1",
        tileSize: 512,
        maxzoom: 14
      });
      if (terrainOn) map.setTerrain({ source: "mapbox-dem", exaggeration: 1.4 });

      map.addLayer({
        id: "sky",
        type: "sky",
        paint: {
          "sky-type": "atmosphere",
          "sky-atmosphere-sun": [0.0, 0.0],
          "sky-atmosphere-sun-intensity": 12
        }
      });

      map.addSource("cones",   { type: "geojson", data: cones });
      map.addSource("lines",   { type: "geojson", data: lines });
      map.addSource("objects", { type: "geojson", data: objects });
      map.addSource("cameras", { type: "geojson", data: cameras });

      // Drawn bottom -> top: cones, lines, subjects, camera dots.
      // Paint values come from CONFIG; applyAllStyles() (below) keeps them in sync.
      map.addLayer({
        id: "cones",
        type: "fill",
        source: "cones",
        layout: { visibility: CONFIG.cones.visible ? "visible" : "none" },
        paint: {
          "fill-color": CONFIG.cones.ramp ? ["get", "color"] : CONFIG.cones.color,
          "fill-opacity": CONFIG.cones.opacity
        }
      });

      map.addLayer({
        id: "lines",
        type: "line",
        source: "lines",
        layout: { "line-join": "round", "line-cap": "round", visibility: CONFIG.lines.visible ? "visible" : "none" },
        paint: {
          "line-color": CONFIG.lines.color,
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, CONFIG.lines.width * 0.5, 18, CONFIG.lines.width],
          "line-opacity": CONFIG.lines.opacity
        }
      });

      map.addLayer({
        id: "objects",
        type: "circle",
        source: "objects",
        layout: { visibility: CONFIG.objects.visible ? "visible" : "none" },
        paint: {
          "circle-color": CONFIG.objects.color,
          "circle-opacity": CONFIG.objects.opacity,
          "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, CONFIG.objects.size * 0.6, 18, CONFIG.objects.size],
          "circle-stroke-width": 1,
          "circle-stroke-color": "rgba(0,0,0,0.4)",
          "circle-stroke-opacity": CONFIG.objects.opacity
        }
      });

      map.addLayer({
        id: "cameras",
        type: "circle",
        source: "cameras",
        layout: { visibility: CONFIG.cameras.visible ? "visible" : "none" },
        paint: {
          "circle-color": CONFIG.cameras.color,
          "circle-opacity": CONFIG.cameras.opacity,
          "circle-stroke-width": 1.5,
          "circle-stroke-color": CONFIG.cameras.color,
          "circle-stroke-opacity": 1,
          "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, CONFIG.cameras.size * 0.6, 18, CONFIG.cameras.size]
        }
      });

      // Polygon-selection overlay (drawn on top).
      map.addSource("select",     { type: "geojson", data: emptyFC() });
      map.addSource("select-pts", { type: "geojson", data: emptyFC() });
      map.addLayer({ id: "select-fill",  type: "fill",   source: "select",     paint: { "fill-color": "#34d6f2", "fill-opacity": 0.12 } });
      map.addLayer({ id: "select-line",  type: "line",   source: "select",     paint: { "line-color": "#34d6f2", "line-width": 2, "line-dasharray": [2, 1.5] } });
      map.addLayer({ id: "select-verts", type: "circle", source: "select-pts", paint: { "circle-radius": 4, "circle-color": "#34d6f2", "circle-stroke-color": "#fff", "circle-stroke-width": 1.5 } });

      wireInteractions();      // once-guarded: safe to call again after setStyle
      applyAllStyles();        // re-apply CONFIG paint/visibility
      applyFilters();          // re-apply active filters
      rebuildCones();          // re-fit cone radius to the current zoom
      if (selectMode) renderSelect(null);
      load();                  // refetch (self-cancelling / debounced)
    });

    const debouncedLoad = debounce(load, 350);
    map.on("moveend", function () { writeHash(); saveStateDebounced(); debouncedLoad(); });
    map.on("zoomend", rebuildCones);
    map.on("zoom", debounce(rebuildCones, 60));
    map.on("error", function (e) { console.warn("Mapbox error:", e && e.error); });

    // ---- Interactions --------------------------------------------------------
    // Layer ids === source ids. Which opacity props each layer dims on hover.
    const HOVER_LAYERS = SOURCE_IDS;
    const OPACITY = [
      { id: "cones",   props: ["fill-opacity"] },
      { id: "lines",   props: ["line-opacity"] },
      { id: "objects", props: ["circle-opacity", "circle-stroke-opacity"] },
      { id: "cameras", props: ["circle-opacity", "circle-stroke-opacity"] }
    ];
    // The "full" (non-dimmed) opacity for a layer/prop, read live from CONFIG so
    // user-adjusted opacities survive a hover gesture instead of snapping back.
    function opacityFull(id, prop) {
      const c = CONFIG[id];
      if (id === "cameras" && prop === "circle-stroke-opacity") return 1;
      return c ? c.opacity : 1;
    }

    let wired = false;   // bind map/document handlers exactly once (setStyle re-fires style.load)
    function wireInteractions() {
      if (wired) return;
      wired = true;

      // One throttled handler instead of 4 per-layer handlers. The mousemove
      // event only records the point; the query/paint work runs once per frame.
      map.on("mousemove", function (e) {
        if (selectMode) { renderSelect(e.lngLat); return; }
        pendingPoint = e.point;
        if (!rafId) rafId = requestAnimationFrame(processHover);
      });
      map.getCanvas().addEventListener("mouseout", function () { if (!selectMode) clearHover(); });

      map.on("click", function (e) {
        if (selectMode) { onSelectClick(e.lngLat); return; }
        const f = topFeatureAt(e.point);
        if (f) openModal(f.properties);
      });
      map.on("dblclick", function (e) {
        if (!selectMode) return;
        e.preventDefault();
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
        finishSelect();
      });

      // Right-click → external map services menu.
      map.on("contextmenu", function (e) { showCtxMenu(e.point, e.lngLat); });
      map.getCanvas().addEventListener("contextmenu", function (ev) { ev.preventDefault(); });
      map.on("movestart", hideCtxMenu);
      document.addEventListener("click", function (e) {
        if ($ctx && $ctx.style.display === "block" && !$ctx.contains(e.target)) hideCtxMenu();
      });
      $ctx.addEventListener("click", function (e) { if (e.target.tagName === "A") hideCtxMenu(); });
    }

    function topFeatureAt(point) {
      const bb = [[point.x - 3, point.y - 3], [point.x + 3, point.y + 3]];
      const fs = map.queryRenderedFeatures(bb, { layers: HOVER_LAYERS });
      return fs.length ? fs[0] : null;
    }

    function processHover() {
      rafId = 0;
      if (!pendingPoint) return;
      const f = topFeatureAt(pendingPoint);
      if (!f) { if (hoverId !== null) clearHover(); return; }

      if (f.id === hoverId) return;              // same photo — nothing to do
      if (hoverId !== null) setHover(hoverId, false);
      hoverId = f.id;
      setHover(hoverId, true);                    // cheap per-feature highlight
      map.getCanvas().style.cursor = "pointer";
      enterDimSession();                          // dim others (once per gesture)
      showPreview(f.properties);
    }

    // Toggle hover state for one photo across all 4 sources (same id in each).
    function setHover(id, on) {
      if (id == null) return;
      SOURCE_IDS.forEach(function (src) {
        if (!map.getSource(src)) return;
        try { map.setFeatureState({ source: src, id: id }, { hover: on }); }
        catch (e) { /* source mid-reload after setData — safe to skip */ }
      });
    }

    function clearHover() {
      if (hoverId !== null) { setHover(hoverId, false); hoverId = null; }
      leaveDimSession();
      hidePreview();
      map.getCanvas().style.cursor = "";
    }

    // Dim everyone except the feature-state:hover one. Set ONCE per hover gesture
    // (not per mousemove) — the in-gesture highlight is pure setFeatureState.
    function enterDimSession() {
      if (dimActive) return;
      dimActive = true;
      SOURCE_IDS.forEach(applyOpacity);
    }
    function leaveDimSession() {
      if (!dimActive) return;
      dimActive = false;
      SOURCE_IDS.forEach(applyOpacity);
    }
    // Set a layer's opacity props: a hover-dim expression while a dim session is
    // active, or the flat CONFIG value otherwise. Used by both the dim session
    // and applyLayerStyle so the two never fight over opacity.
    function applyOpacity(id) {
      const cfg = OPACITY.find(function (o) { return o.id === id; });
      if (!cfg || !map.getLayer(id)) return;
      cfg.props.forEach(function (prop) {
        const full = opacityFull(id, prop);
        map.setPaintProperty(id, prop, dimActive
          ? ["case", ["boolean", ["feature-state", "hover"], false], full, DIM]
          : full);
      });
    }

    function showPreview(p) {
      const token = ++previewToken;
      // Blank the <img> immediately so the previous photo never lingers, then
      // reveal the new one only once ITS load fires for the still-current token.
      $previewImg.classList.remove("loaded");
      $previewImg.removeAttribute("src");
      $previewImg.onload  = function () { if (token === previewToken) $previewImg.classList.add("loaded"); };
      $previewImg.onerror = function () { if (token === previewToken) $previewImg.classList.remove("loaded"); };
      $previewImg.src = p.url + "?width=400";
      $previewCap.innerHTML = "<strong>" + escapeHtml(prettyTitle(p.title)) + "</strong><br>Loading…";
      $preview.classList.add("show");
      fetchAttribution(p.title).then(function (a) {
        if (token !== previewToken) return;      // user moved on — drop stale fill
        const who = (a.author && a.author !== "Unknown author")
          ? "by " + escapeHtml(a.author) : "Unknown author";
        const lic = a.license ? " · " + escapeHtml(a.license) : "";
        $previewCap.innerHTML = "<strong>" + escapeHtml(prettyTitle(p.title)) + "</strong><br>" + who + lic;
      });
    }
    function hidePreview() {
      $preview.classList.remove("show");
      previewToken++;
      $previewImg.classList.remove("loaded");
      $previewImg.removeAttribute("src");
    }

    function openModal(p) {
      $modalImg.src = p.url + "?width=1600";
      const fileUrl    = "https://commons.wikimedia.org/wiki/" + encodeURIComponent(p.title);
      const locatorUrl = LOCATOR + encodeURIComponent(p.title);
      $modalMeta.innerHTML =
        '<div class="title">' + escapeHtml(prettyTitle(p.title)) + '</div>' +
        '<div class="by" id="modal-by">Loading…</div>' +
        '<div class="links">' +
          '<a href="' + fileUrl + '" target="_blank" rel="noopener">View on Commons ↗</a>' +
          '<a href="' + locatorUrl + '" target="_blank" rel="noopener">Edit location in Locator Tool ↗</a>' +
        '</div>';
      $modal.classList.add("show");
      $map.classList.add("blur");
      modalState = { open: true, url: p.url, title: p.title };
      saveState();
      const token = ++modalToken;
      fetchAttribution(p.title).then(function (a) {
        if (token !== modalToken) return;        // modal closed or changed
        const by = (a.authorHtml && a.authorHtml.length) ? a.authorHtml
                 : (a.author ? escapeHtml(a.author) : "Unknown author");
        const lic = a.license ? ' &nbsp;·&nbsp; ' + escapeHtml(a.license) : "";
        const el = document.getElementById("modal-by");
        if (el) el.innerHTML = "by " + by + lic;
      });
    }
    function closeModal() {
      $modal.classList.remove("show");
      $map.classList.remove("blur");
      $modalImg.src = "";
      modalToken++;   // discard any pending attribution fill
      modalState = { open: false, url: null, title: null };
      saveState();
    }
    document.getElementById("modal-close").addEventListener("click", closeModal);
    $modal.addEventListener("click", function (e) { if (e.target === $modal) closeModal(); });
    document.addEventListener("keydown", function (e) {
      if (e.key !== "Escape") return;
      if (selectMode) { exitSelectMode(); setStatus("Selection cancelled", false); return; }
      if ($ctx && $ctx.style.display === "block") { hideCtxMenu(); return; }
      closeModal();
    });

    // ---- Data loading --------------------------------------------------------
    function setStatus(text, loading) {
      $statusText.textContent = text;
      $status.classList.toggle("loading", !!loading);
    }

    function load() {
      const b = map.getBounds();
      const spanLat = b.getNorth() - b.getSouth();
      const spanLon = b.getEast() - b.getWest();

      if (spanLat > 0.7 || spanLon > 0.7) {
        setStatus("Zoom in to load nearby photos", false);
        return;
      }

      const bbox = [b.getNorth(), b.getWest(), b.getSouth(), b.getEast()].join("|");
      // Bulk query stays cheap: coordinates only. Attribution is fetched lazily
      // on hover/click (extmetadata is "expensive" per the Commons API docs).
      const params = new URLSearchParams({
        action: "query",
        format: "json",
        origin: "*",                                  // CORS for anonymous reads
        maxlag: "5",                                  // be polite to the API
        prop: "coordinates",
        coprop: "type|name",
        coprimary: "all",
        colimit: "500",
        generator: "geosearch",
        ggsbbox: bbox,                                // top|left|bottom|right
        ggslimit: "500",
        ggsnamespace: "6",                            // File: namespace
        ggsprimary: "all"
      });

      // Cancel any still-running request so a slow one can't clobber fresh data.
      if (loadAbort) loadAbort.abort();
      loadAbort = new AbortController();

      setStatus("Loading photos…", true);

      fetch(COMMONS_API + "?" + params.toString(), { signal: loadAbort.signal })
        .then(function (r) { return r.json(); })
        .then(process)
        .catch(function (err) {
          if (err && err.name === "AbortError") return;   // superseded by a newer pan
          console.warn("Commons request failed:", err);
          setStatus("Couldn't reach Wikimedia Commons", false);
        });
    }

    function process(data) {
      const before = SOURCES.map(function (s) { return s.features.length; });
      const pages = data && data.query && data.query.pages;
      if (pages) {
        Object.keys(pages).forEach(function (key) {
          const page = pages[key];
          const coords = page.coordinates;
          if (!coords || !coords.length) return;

          const url = FILEPATH + encodeURIComponent(page.title);
          if (seen.has(url)) return;
          seen.add(url);
          order.push(url);

          const id = idFor(url);

          if (coords.length === 1) {
            // Only a location is known — a plain camera dot, no direction.
            const meta = { url: url, title: page.title, hasLos: false, dist: null, bearing: null };
            cameras.features.push(feature("Point", [coords[0].lon, coords[0].lat], meta, id));
          } else {
            // Camera + subject -> direction, distance, view cone.
            let cam = coords.find(function (c) { return c.type === "camera"; });
            let obj = coords.find(function (c) { return c !== cam; });
            if (!cam) cam = coords[0];
            if (!obj) obj = coords[1];

            const dist = distance(cam.lon, cam.lat, obj.lon, obj.lat);
            const br   = bearing(cam.lon, cam.lat, obj.lon, obj.lat);
            const t    = clamp(dist / 1500, 0, 1);     // 0 = near, 1 = far
            const half = lerp(38, 7, t);               // cone HALF-ANGLE encodes distance (wide=near, narrow=far)
            const rad  = coneRadiusMeters(cam.lat);    // length is constant on screen, not distance

            // Shared props let filters (dist/bearing/hasLos) target every layer.
            const meta = { url: url, title: page.title, hasLos: true, dist: Math.round(dist), bearing: Math.round(br) };
            // Cones additionally carry what rebuildCones() needs to refit on zoom.
            const coneMeta = Object.assign({}, meta, { color: rampColor(t), camLon: cam.lon, camLat: cam.lat, widthDeg: half });

            cones.features.push(feature("Polygon", wedge(cam.lon, cam.lat, br, half, rad), coneMeta, id));
            lines.features.push(feature("LineString", [[cam.lon, cam.lat], [obj.lon, obj.lat]], meta, id));
            objects.features.push(feature("Point", [obj.lon, obj.lat], meta, id));
            cameras.features.push(feature("Point", [cam.lon, cam.lat], meta, id));
          }
        });
      }

      // Mark sources that gained features, then evict (which may mark more).
      const dirty = new Set();
      SOURCES.forEach(function (s, i) { if (s.features.length !== before[i]) dirty.add(i); });
      evictOldest(dirty);

      // Clear hover BEFORE setData (sources still loaded) so no feature-state dangles.
      if (dirty.size && hoverId !== null) clearHover();
      // Only re-upload sources that actually changed — setData reprocesses the
      // whole collection, so skipping unchanged ones matters when panning.
      dirty.forEach(function (i) { map.getSource(SOURCE_IDS[i]).setData(SOURCES[i]); });

      const n = seen.size;
      const dir = cones.features.length;
      setStatus(n + " photo" + (n === 1 ? "" : "s") + " · " + dir + " with a direction", false);
    }

    // Keep memory bounded: drop the oldest-loaded photos past the cap.
    function evictOldest(dirty) {
      let toEvict = seen.size - MAX_PHOTOS;
      if (toEvict <= 0) return;
      const remove = new Set();
      while (toEvict > 0 && order.length) {
        const url = order.shift();
        if (!seen.has(url)) continue;
        seen.delete(url);
        urlToId.delete(url);
        const title = titleFromUrl(url);
        if (title) attrCache.delete(title);
        remove.add(url);
        toEvict--;
      }
      if (!remove.size) return;
      SOURCES.forEach(function (s, i) {
        const kept = s.features.filter(function (f) { return !remove.has(f.properties.url); });
        if (kept.length !== s.features.length) { s.features = kept; dirty.add(i); }
      });
    }

    function feature(type, coordinates, properties, id) {
      return { type: "Feature", id: id, properties: properties, geometry: { type: type, coordinates: coordinates } };
    }

    function titleFromUrl(url) {
      try { return decodeURIComponent(url.slice(FILEPATH.length)); } catch (e) { return null; }
    }

    // ---- Attribution (lazy, cached) -----------------------------------------
    const ATTR_FALLBACK = { author: "Unknown author", authorHtml: "", license: "" };

    function parseAttr(page) {
      const ii = page && page.imageinfo && page.imageinfo[0];
      const em = (ii && ii.extmetadata) || {};
      const artistHtml = (em.Artist && em.Artist.value) || "";
      return {
        author: stripTags(artistHtml) || "Unknown author",
        authorHtml: sanitizeHtml(artistHtml) || "",
        license: (em.LicenseShortName && em.LicenseShortName.value) || ""
      };
    }

    function fetchAttribution(title) {
      if (attrCache.has(title)) return Promise.resolve(attrCache.get(title));
      if (attrInflight.has(title)) return attrInflight.get(title);

      const params = new URLSearchParams({
        action: "query",
        format: "json",
        origin: "*",
        maxlag: "5",
        titles: title,
        prop: "imageinfo",
        iiprop: "extmetadata",
        iiextmetadatafilter: "Artist|LicenseShortName|Attribution|Credit"
      });

      const p = fetch(COMMONS_API + "?" + params.toString())
        .then(function (r) { return r.json(); })
        .then(function (data) {
          const pages = data && data.query && data.query.pages;
          let attr = ATTR_FALLBACK;
          if (pages) { const k = Object.keys(pages)[0]; if (k) attr = parseAttr(pages[k]); }
          attrCache.set(title, attr);
          attrInflight.delete(title);
          return attr;
        })
        .catch(function () {
          attrInflight.delete(title);
          attrCache.set(title, ATTR_FALLBACK);  // don't refetch a failing title
          return ATTR_FALLBACK;
        });

      attrInflight.set(title, p);
      return p;
    }

    // ---- Geometry ------------------------------------------------------------
    function toRad(d) { return d * Math.PI / 180; }
    function toDeg(r) { return r * 180 / Math.PI; }

    function distance(lon1, lat1, lon2, lat2) {
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function bearing(lon1, lat1, lon2, lat2) {
      const p1 = toRad(lat1), p2 = toRad(lat2), dl = toRad(lon2 - lon1);
      const y = Math.sin(dl) * Math.cos(p2);
      const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
      return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    function destination(lon, lat, brng, dist) {
      const d = dist / R, b = toRad(brng), p1 = toRad(lat), l1 = toRad(lon);
      const p2 = Math.asin(Math.sin(p1) * Math.cos(d) + Math.cos(p1) * Math.sin(d) * Math.cos(b));
      const l2 = l1 + Math.atan2(Math.sin(b) * Math.sin(d) * Math.cos(p1),
                                 Math.cos(d) - Math.sin(p1) * Math.sin(p2));
      return [toDeg(l2), toDeg(p2)];
    }

    // Pie-slice polygon at (lon,lat) facing `brng`, ±half degrees, `rad` metres long.
    function wedge(lon, lat, brng, half, rad) {
      const ring = [[lon, lat]];
      const steps = 18;
      for (let i = 0; i <= steps; i++) {
        ring.push(destination(lon, lat, brng - half + (2 * half) * i / steps, rad));
      }
      ring.push([lon, lat]);
      return [ring];
    }

    // White (near) -> blue (far).
    function rampColor(t) {
      t = clamp(t, 0, 1);
      const r = Math.round(255 + (74 - 255) * t);
      const g = Math.round(255 + (150 - 255) * t);
      return "rgb(" + r + "," + g + ",255)";
    }

    // ---- Helpers -------------------------------------------------------------
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function prettyTitle(title) {
      if (!title) return "";
      return title.replace(/^File:/, "").replace(/\.[a-z0-9]+$/i, "").replace(/_/g, " ");
    }

    function stripTags(html) {
      if (!html) return "";
      const doc = new DOMParser().parseFromString(html, "text/html");
      return (doc.body.textContent || "").trim().replace(/\s+/g, " ");
    }

    // Keep author links, strip anything executable.
    function sanitizeHtml(html) {
      if (!html) return "";
      const doc = new DOMParser().parseFromString(html, "text/html");
      doc.querySelectorAll("script,style,iframe").forEach(function (n) { n.remove(); });
      doc.querySelectorAll("*").forEach(function (el) {
        Array.prototype.slice.call(el.attributes).forEach(function (attr) {
          const name = attr.name.toLowerCase();
          if (name.indexOf("on") === 0) el.removeAttribute(attr.name);
          if ((name === "href" || name === "src") && /^\s*javascript:/i.test(attr.value)) {
            el.removeAttribute(attr.name);
          }
        });
        if (el.tagName === "A") { el.setAttribute("target", "_blank"); el.setAttribute("rel", "noopener"); }
      });
      return doc.body.innerHTML.trim();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
      });
    }

    function debounce(fn, ms) {
      let t;
      return function () {
        clearTimeout(t);
        const args = arguments, ctx = this;
        t = setTimeout(function () { fn.apply(ctx, args); }, ms);
      };
    }

    function emptyFC() { return { type: "FeatureCollection", features: [] }; }

    // ---- Layer styling (CONFIG -> Mapbox paint) ------------------------------
    function applyLayerStyle(id) {
      if (!map.getLayer(id)) return;
      const c = CONFIG[id];
      map.setLayoutProperty(id, "visibility", c.visible ? "visible" : "none");
      if (id === "cones") {
        map.setPaintProperty("cones", "fill-color", c.ramp ? ["get", "color"] : c.color);
      } else if (id === "lines") {
        map.setPaintProperty("lines", "line-color", c.color);
        map.setPaintProperty("lines", "line-width", ["interpolate", ["linear"], ["zoom"], 10, c.width * 0.5, 18, c.width]);
      } else if (id === "objects") {
        map.setPaintProperty("objects", "circle-color", c.color);
        map.setPaintProperty("objects", "circle-radius", ["interpolate", ["linear"], ["zoom"], 10, c.size * 0.6, 18, c.size]);
      } else if (id === "cameras") {
        map.setPaintProperty("cameras", "circle-color", c.color);
        map.setPaintProperty("cameras", "circle-stroke-color", c.color);
        map.setPaintProperty("cameras", "circle-radius", ["interpolate", ["linear"], ["zoom"], 10, c.size * 0.6, 18, c.size]);
      }
      applyOpacity(id);
    }
    function applyAllStyles() { SOURCE_IDS.forEach(applyLayerStyle); }

    // ---- Constant-screen-size cones ------------------------------------------
    // Ground resolution (m per screen pixel) at the map centre's latitude/zoom.
    function metersPerPixel(lat, zoom) {
      return 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
    }
    function coneRadiusMeters(lat) {
      return CONFIG.cones.pxSize * metersPerPixel(lat, map.getZoom());
    }
    // Re-fit every cone's radius so it stays ~constant on screen (declutters when
    // zooming in). Angle/bearing/camera come from the persisted cone properties.
    function rebuildCones() {
      if (!cones.features.length) return;
      cones.features.forEach(function (f) {
        const p = f.properties;
        if (p.camLon == null) return;
        f.geometry.coordinates = wedge(p.camLon, p.camLat, p.bearing, p.widthDeg, coneRadiusMeters(p.camLat));
      });
      const src = map.getSource("cones");
      if (src) src.setData(cones);
    }
    const rebuildConesDebounced = debounce(rebuildCones, 60);

    // ---- Filters (Mapbox setFilter expressions from persisted props) ---------
    function lengthClause() {
      const g = ["coalesce", ["get", "dist"], -1];
      const lo = Math.min(FILTERS.minLen, FILTERS.maxLen);
      const hi = Math.max(FILTERS.minLen, FILTERS.maxLen);
      return ["all", [">=", g, lo], ["<=", g, hi >= LEN_MAX ? 1e9 : hi]];
    }
    function bearingClause() {
      const g = ["coalesce", ["get", "bearing"], -1];
      const lo = FILTERS.bearMin, hi = FILTERS.bearMax;
      if (lo <= hi) return ["all", [">=", g, lo], ["<=", g, hi]];
      return ["any", [">=", g, lo], ["all", [">=", g, 0], ["<=", g, hi]]];  // wraps through North
    }
    function buildFilterFor(id) {
      const len = lengthClause(), bear = bearingClause(), los = FILTERS.los;
      if (id === "cameras") {
        // cameras holds BOTH camera-only (hasLos:false) and camera+subject photos.
        const isNo  = ["==", ["get", "hasLos"], false];
        const isLos = ["==", ["get", "hasLos"], true];
        if (los === "nolos") return isNo;
        const match = ["all", len, bear];
        if (los === "los") return ["all", isLos, match];
        return ["any", isNo, ["all", isLos, match]];   // "all": camera-only always pass
      }
      // cones / lines / objects only ever hold has-LOS features.
      if (los === "nolos") return ["==", ["literal", 1], ["literal", 0]];   // hide all
      return ["all", len, bear];
    }
    function applyFilters() {
      SOURCE_IDS.forEach(function (id) {
        if (map.getLayer(id)) map.setFilter(id, buildFilterFor(id));
      });
      if (hoverId !== null) clearHover();   // a filtered-out hover would dangle
    }

    // ---- Basemap switching ---------------------------------------------------
    function switchBasemap(styleId) {
      if (styleId === currentStyle) return;
      currentStyle = styleId;
      hideCtxMenu();
      map.setStyle("mapbox://styles/mapbox/" + styleId);  // re-fires style.load -> everything re-added
    }

    // ---- Control panel (built from CONFIG) -----------------------------------
    function buildPanel() {
      const $panel = document.getElementById("panel");
      const $body  = $panel.querySelector(".pbody");

      const losBtn = function (v, label) { return '<button data-los="' + v + '"' + (FILTERS.los === v ? ' class="on"' : '') + '>' + label + '</button>'; };
      const filtersHtml =
        '<div class="sect"><div class="lbl">Filters</div>' +
          '<div class="frow"><span class="k">Length ≥</span><input type="range" id="f-minlen" min="0" max="' + LEN_MAX + '" step="10" value="' + FILTERS.minLen + '"><span class="v" id="f-minlen-v">' + Math.round(FILTERS.minLen) + ' m</span></div>' +
          '<div class="frow"><span class="k">Length ≤</span><input type="range" id="f-maxlen" min="0" max="' + LEN_MAX + '" step="10" value="' + FILTERS.maxLen + '"><span class="v" id="f-maxlen-v">' + (FILTERS.maxLen >= LEN_MAX ? "∞" : Math.round(FILTERS.maxLen) + " m") + '</span></div>' +
          '<div class="row"><span class="k">Sight</span><div class="seg" id="los-seg">' +
            losBtn("all", "Any") + losBtn("los", "Has") + losBtn("nolos", "None") +
          '</div></div>' +
          '<div class="frow"><span class="k">Facing ≥</span><input type="range" id="f-bmin" min="0" max="360" step="5" value="' + FILTERS.bearMin + '"><span class="v" id="f-bmin-v">' + Math.round(FILTERS.bearMin) + '°</span></div>' +
          '<div class="frow"><span class="k">Facing ≤</span><input type="range" id="f-bmax" min="0" max="360" step="5" value="' + FILTERS.bearMax + '"><span class="v" id="f-bmax-v">' + Math.round(FILTERS.bearMax) + '°</span></div>' +
          '<div class="readout" id="f-bnote">' + (FILTERS.bearMin > FILTERS.bearMax ? "wraps through North (0°)" : "") + '</div>' +
        '</div>';

      const layerDefs = [
        { id: "cones",   name: "Direction cone", swatch: "cone", min: 8, max: 60, prop: "pxSize" },
        { id: "lines",   name: "Line of sight",  swatch: "los",  min: 1, max: 8,  prop: "width"  },
        { id: "objects", name: "Subject",        swatch: "obj",  min: 2, max: 12, prop: "size"   },
        { id: "cameras", name: "Camera",         swatch: "cam",  min: 2, max: 14, prop: "size"   }
      ];
      let layersHtml = '<div class="sect"><div class="lbl">Layers</div>';
      layerDefs.forEach(function (L) {
        const c = CONFIG[L.id];
        layersHtml +=
          '<div class="row">' +
            '<input type="checkbox" data-layer="' + L.id + '" data-prop="visible"' + (c.visible ? " checked" : "") + '>' +
            '<span class="swatch ' + L.swatch + '"></span>' +
            '<label class="name">' + L.name + '</label>' +
            '<input type="color" data-layer="' + L.id + '" data-prop="color" value="' + c.color + '">' +
            '<input type="range" class="mini" data-layer="' + L.id + '" data-prop="' + L.prop + '" min="' + L.min + '" max="' + L.max + '" step="1" value="' + c[L.prop] + '" title="size">' +
          '</div>' +
          '<div class="row sub2"><span class="k2">opacity</span>' +
            '<input type="range" data-layer="' + L.id + '" data-prop="opacity" min="0" max="1" step="0.05" value="' + c.opacity + '"></div>';
        if (L.id === "cones") {
          layersHtml +=
            '<div class="row sub2"><input type="checkbox" data-layer="cones" data-prop="ramp"' + (c.ramp ? " checked" : "") + '>' +
              '<label class="name">Distance color ramp</label></div>';
        }
      });
      layersHtml += '</div>';

      const basemapOpts = BASEMAPS.map(function (b) {
        return '<option value="' + b.id + '"' + (b.id === currentStyle ? " selected" : "") + '>' + b.name + '</option>';
      }).join("");
      const basemapHtml =
        '<div class="sect"><div class="lbl">Basemap</div>' +
          '<div class="row"><select id="basemap-sel">' + basemapOpts + '</select></div>' +
          '<div class="row"><input type="checkbox" id="terrain-toggle"' + (terrainOn ? " checked" : "") + '><label class="name">3D terrain</label></div>' +
        '</div>';

      const selectHtml = '<div class="sect"><button class="btn" id="select-btn">▱ Select area → Locator Tool</button></div>';

      $body.innerHTML = filtersHtml + layersHtml + basemapHtml + selectHtml;
      wirePanel($panel, $body);
    }

    function wirePanel($panel, $body) {
      $panel.querySelector(".phead").addEventListener("click", function () { $panel.classList.toggle("collapsed"); saveStateDebounced(); });

      // Layer visibility / color / size / opacity / ramp (delegated).
      function onLayerControl(e) {
        const el = e.target;
        if (!el || !el.getAttribute) return;
        const layer = el.getAttribute("data-layer");
        if (!layer) return;
        const prop = el.getAttribute("data-prop");
        let val;
        if (el.type === "checkbox") val = el.checked;
        else if (el.type === "range") val = parseFloat(el.value);
        else val = el.value;
        CONFIG[layer][prop] = val;
        applyLayerStyle(layer);
        if (layer === "cones" && (prop === "pxSize" || prop === "ramp")) rebuildConesDebounced();
        saveStateDebounced();
      }
      $body.addEventListener("input", onLayerControl);
      $body.addEventListener("change", onLayerControl);

      // Length filter.
      const minS = document.getElementById("f-minlen"), maxS = document.getElementById("f-maxlen");
      const minV = document.getElementById("f-minlen-v"), maxV = document.getElementById("f-maxlen-v");
      function onLen() {
        FILTERS.minLen = parseFloat(minS.value);
        FILTERS.maxLen = parseFloat(maxS.value);
        minV.textContent = Math.round(FILTERS.minLen) + " m";
        maxV.textContent = FILTERS.maxLen >= LEN_MAX ? "∞" : Math.round(FILTERS.maxLen) + " m";
        applyFilters();
        saveStateDebounced();
      }
      minS.addEventListener("input", onLen);
      maxS.addEventListener("input", onLen);

      // Has / no line-of-sight.
      const seg = document.getElementById("los-seg");
      seg.addEventListener("click", function (e) {
        const b = e.target.closest("button");
        if (!b) return;
        FILTERS.los = b.getAttribute("data-los");
        Array.prototype.forEach.call(seg.querySelectorAll("button"), function (x) { x.classList.toggle("on", x === b); });
        applyFilters();
        saveStateDebounced();
      });

      // Orientation filter (with wrap-around).
      const bminS = document.getElementById("f-bmin"), bmaxS = document.getElementById("f-bmax");
      const bminV = document.getElementById("f-bmin-v"), bmaxV = document.getElementById("f-bmax-v");
      const bnote = document.getElementById("f-bnote");
      function onBear() {
        FILTERS.bearMin = parseFloat(bminS.value);
        FILTERS.bearMax = parseFloat(bmaxS.value);
        bminV.textContent = Math.round(FILTERS.bearMin) + "°";
        bmaxV.textContent = Math.round(FILTERS.bearMax) + "°";
        bnote.textContent = FILTERS.bearMin > FILTERS.bearMax ? "wraps through North (0°)" : "";
        applyFilters();
        saveStateDebounced();
      }
      bminS.addEventListener("input", onBear);
      bmaxS.addEventListener("input", onBear);

      // Basemap + terrain.
      document.getElementById("basemap-sel").addEventListener("change", function (e) { switchBasemap(e.target.value); saveStateDebounced(); });
      document.getElementById("terrain-toggle").addEventListener("change", function (e) {
        terrainOn = e.target.checked;
        if (terrainOn) map.setTerrain({ source: "mapbox-dem", exaggeration: 1.4 });
        else map.setTerrain(null);
        saveStateDebounced();
      });

      $selectBtn = document.getElementById("select-btn");
      $selectBtn.addEventListener("click", enterSelectMode);
    }

    // ---- Polygon selection -> Locator Tool -----------------------------------
    function enterSelectMode() {
      if (selectMode) { exitSelectMode(); setStatus("Selection cancelled", false); return; }
      selectMode = true;
      selectPts = [];
      hideCtxMenu();
      clearHover();
      map.doubleClickZoom.disable();
      map.getCanvas().style.cursor = "crosshair";
      if ($selectBtn) $selectBtn.classList.add("active");
      setStatus("Click to add points · double-click to finish · Esc to cancel", false);
    }
    function exitSelectMode() {
      selectMode = false;
      selectPts = [];
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      renderSelect(null);
      map.doubleClickZoom.enable();
      map.getCanvas().style.cursor = "";
      if ($selectBtn) $selectBtn.classList.remove("active");
    }
    // Defer adding a vertex briefly so a double-click (finish) doesn't also drop
    // two stray vertices.
    function onSelectClick(lngLat) {
      if (clickTimer) clearTimeout(clickTimer);
      clickTimer = setTimeout(function () {
        clickTimer = null;
        selectPts.push([lngLat.lng, lngLat.lat]);
        renderSelect(null);
      }, 220);
    }
    function renderSelect(cursor) {
      const ring = selectPts.map(function (p) { return [p[0], p[1]]; });
      if (cursor) ring.push([cursor.lng, cursor.lat]);
      const ptsFC = { type: "FeatureCollection", features: selectPts.map(function (p) { return feature("Point", [p[0], p[1]], {}, undefined); }) };
      let geoFC;
      if (ring.length >= 3)      geoFC = { type: "FeatureCollection", features: [feature("Polygon", [ring.concat([ring[0]])], {}, undefined)] };
      else if (ring.length === 2) geoFC = { type: "FeatureCollection", features: [feature("LineString", ring, {}, undefined)] };
      else                        geoFC = emptyFC();
      const s1 = map.getSource("select");     if (s1) s1.setData(geoFC);
      const s2 = map.getSource("select-pts"); if (s2) s2.setData(ptsFC);
    }
    function finishSelect() {
      const ring = selectPts.slice();
      if (ring.length < 3) { exitSelectMode(); setStatus("Need at least 3 points — selection cancelled", false); return; }
      const xs = ring.map(function (p) { return map.project(p).x; });
      const ys = ring.map(function (p) { return map.project(p).y; });
      const bb = [[Math.min.apply(null, xs), Math.min.apply(null, ys)], [Math.max.apply(null, xs), Math.max.apply(null, ys)]];
      // queryRenderedFeatures honours active filters + visibility for free.
      const feats = map.queryRenderedFeatures(bb, { layers: ["cameras"] });
      const titles = [], seenT = new Set();
      feats.forEach(function (f) {
        const c = f.geometry && f.geometry.coordinates;
        if (!c || !pointInPolygon(c, ring)) return;
        const tt = f.properties && f.properties.title;
        if (tt && !seenT.has(tt)) { seenT.add(tt); titles.push(tt); }
      });
      exitSelectMode();
      if (!titles.length) { setStatus("No photos inside the selection", false); return; }
      if (titles.length > 50 && !window.confirm(titles.length + " photos selected. Open them all in the Locator Tool?")) {
        setStatus(titles.length + " photos selected (not opened)", false);
        return;
      }
      // Locator Tool takes pipe-separated file titles after #/geolocate?files=
      const url = LOCATOR + titles.map(function (tt) { return encodeURIComponent(tt.replace(/^File:/, "")); }).join("|");
      window.open(url, "_blank", "noopener");
      setStatus(titles.length + " photo" + (titles.length === 1 ? "" : "s") + " sent to the Locator Tool", false);
    }
    function pointInPolygon(pt, ring) {
      const x = pt[0], y = pt[1];
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
      }
      return inside;
    }

    // ---- Right-click services menu -------------------------------------------
    function showCtxMenu(point, lngLat) {
      if (selectMode) return;
      const lat = +lngLat.lat.toFixed(6), lon = +lngLat.lng.toFixed(6);
      const z = map.getZoom(), b = map.getBearing();
      let html = '<div class="cm-head">Open this spot in…</div>';
      MAP_SERVICES.forEach(function (s) {
        html += '<a href="' + s.url(lat, lon, z, b) + '" target="_blank" rel="noopener">' + escapeHtml(s.name) + '</a>';
      });
      html += '<div class="cm-coord">' + lat.toFixed(5) + ', ' + lon.toFixed(5) + '</div>';
      $ctx.innerHTML = html;
      $ctx.style.display = "block";
      const W = window.innerWidth, H = window.innerHeight;
      const mw = $ctx.offsetWidth, mh = $ctx.offsetHeight;
      let x = point.x, y = point.y;
      if (x + mw > W - 8) x = W - mw - 8;
      if (y + mh > H - 8) y = H - mh - 8;
      $ctx.style.left = Math.max(8, x) + "px";
      $ctx.style.top  = Math.max(8, y) + "px";
    }
    function hideCtxMenu() { if ($ctx) $ctx.style.display = "none"; }

    // ---- URL hash map state (#map=zoom/lat/lon/bearing/pitch) ----------------
    function readHash() {
      const m = /#?map=([-\d.]+)\/([-\d.]+)\/([-\d.]+)(?:\/([-\d.]+))?(?:\/([-\d.]+))?/.exec(location.hash || "");
      if (!m) return null;
      const zoom = parseFloat(m[1]), lat = parseFloat(m[2]), lon = parseFloat(m[3]);
      if (!isFinite(zoom) || !isFinite(lat) || !isFinite(lon)) return null;
      return {
        center: [lon, lat],
        zoom: zoom,
        bearing: m[4] != null ? parseFloat(m[4]) : 0,
        pitch:   m[5] != null ? parseFloat(m[5]) : 0
      };
    }
    function writeHash() {
      const c = map.getCenter();
      const h = "#map=" + map.getZoom().toFixed(2) + "/" + c.lat.toFixed(5) + "/" + c.lng.toFixed(5) +
                "/" + map.getBearing().toFixed(1) + "/" + map.getPitch().toFixed(0);
      try { history.replaceState(history.state, "", h); }
      catch (e) { location.hash = h; }
    }

    // ---- Browser-persisted UI state ------------------------------------------
    // Everything the user can change (layers, filters, basemap, terrain, panel
    // open/closed, search text, the open photo, and the map view) is mirrored to
    // localStorage so a reload comes back exactly as it was left.
    function saveState() {
      try {
        const state = {
          config: CONFIG,
          filters: FILTERS,
          basemap: currentStyle,
          terrain: terrainOn,
          panelCollapsed: !!(document.getElementById("panel") && document.getElementById("panel").classList.contains("collapsed")),
          search: lastSearch,
          modal: modalState
        };
        if (typeof map !== "undefined" && map) {
          const c = map.getCenter();
          state.map = { center: [c.lng, c.lat], zoom: map.getZoom(), bearing: map.getBearing(), pitch: map.getPitch() };
        }
        localStorage.setItem(LS_KEY, JSON.stringify(state));
      } catch (e) { /* storage disabled / full / serialization issue — ignore */ }
    }
    const saveStateDebounced = debounce(saveState, 200);

    // Runs once, very early (before the map/panel/layers are built).
    function loadSavedState() {
      let s;
      try { s = JSON.parse(localStorage.getItem(LS_KEY) || "null"); } catch (e) { s = null; }
      if (!s || typeof s !== "object") return;
      if (s.config) Object.keys(CONFIG).forEach(function (layer) {
        const sv = s.config[layer]; if (!sv) return;
        Object.keys(CONFIG[layer]).forEach(function (k) { if (sv[k] !== undefined) CONFIG[layer][k] = sv[k]; });
      });
      if (s.filters) Object.keys(FILTERS).forEach(function (k) { if (s.filters[k] !== undefined) FILTERS[k] = s.filters[k]; });
      if (s.basemap && BASEMAPS.some(function (b) { return b.id === s.basemap; })) currentStyle = s.basemap;
      if (typeof s.terrain === "boolean") terrainOn = s.terrain;
      if (typeof s.search === "string") lastSearch = s.search;
      if (typeof s.panelCollapsed === "boolean") pendingPanelCollapsed = s.panelCollapsed;
      if (s.modal && s.modal.open && s.modal.url && s.modal.title) pendingModal = { url: s.modal.url, title: s.modal.title };
      if (s.map && Array.isArray(s.map.center) && isFinite(s.map.zoom)) {
        savedMapView = { center: s.map.center, zoom: s.map.zoom, bearing: s.map.bearing || 0, pitch: s.map.pitch || 0 };
      }
    }

    // Runs once after the panel + geocoder exist: restore collapse, search box, modal.
    function applyRestoredUI() {
      const panel = document.getElementById("panel");
      if (panel) panel.classList.toggle("collapsed", pendingPanelCollapsed);
      const gi = document.querySelector(".mapboxgl-ctrl-geocoder input");
      if (gi) {
        if (lastSearch) gi.value = lastSearch;
        gi.addEventListener("input", function () { lastSearch = gi.value; saveStateDebounced(); });
      }
      if (pendingModal) openModal(pendingModal);
    }
  })();
  </script>
</body>
</html>
